name: social-generate

# Once a week, autonomously compose fresh cards from the vetted content bank and add them to
# the rotation. Renders square + Pinterest pin for each, commits them. No secrets needed, no
# LLM, every stat carries a real source, so this is safe to run unattended.

on:
  schedule:
    - cron: "0 13 * * 0"      # Sundays 13:00 UTC = 8am CT, queues content before the week
  workflow_dispatch:
    inputs:
      count:
        description: "How many cards to generate"
        default: "3"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: cd social-poster && npm install --no-audit --no-fund

      - name: Install fonts
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq fontconfig
          mkdir -p ~/.fonts
          cp social-poster/fonts/*.ttf ~/.fonts/
          fc-cache -f >/dev/null 2>&1
          echo "Fonts installed:"; fc-list | grep -iE 'anton|caveat|poppins|permanent|archivo' | sed 's|.*/||'

      - name: Compose new cards
        run: cd social-poster && node compose.mjs "${{ github.event.inputs.count || '3' }}"

      - name: Commit new content
        run: |
          if ! git diff --quiet; then
            git config user.name "renue-social-bot"
            git config user.email "bot@renuehome.com"
            git add assets/social-posts social-poster/content-calendar.json social-poster/bank-state.json
            git commit -m "social: auto-generate weekly cards"
            git push
          else
            echo "Nothing new to commit."
          fi
